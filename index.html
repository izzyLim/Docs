<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docs</title>
<style>
  :root {
    --bg: #0d1117;
    --fg: #e6edf3;
    --muted: #8b949e;
    --card: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.6;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 64px 24px;
  }
  h1 {
    font-size: 2rem;
    margin: 0 0 8px;
  }
  .subtitle {
    color: var(--muted);
    margin: 0 0 40px;
  }
  ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  li {
    margin-bottom: 12px;
  }
  a.card {
    display: block;
    padding: 20px 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    color: var(--fg);
    transition: border-color 0.15s, transform 0.15s;
  }
  a.card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .card-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .card-desc {
    color: var(--muted);
    font-size: 0.9rem;
  }
</style>
</head>
<body>
  <main class="container">
    <h1>Docs</h1>
    <p class="subtitle">Claude & 관련 도구 가이드 모음</p>
    <ul>
      <li>
        <a class="card" href="claude_harness_guide.html">
          <div class="card-title">Claude 하네스 엔지니어링 가이드</div>
          <div class="card-desc">claude_harness_guide.html</div>
        </a>
      </li>
      <li>
        <a class="card" href="claude_workflow_guide.html">
          <div class="card-title">Claude Code 실전 워크플로우 가이드</div>
          <div class="card-desc">claude_workflow_guide.html</div>
        </a>
      </li>
      <li>
        <a class="card" href="claude_agent_sdk_guide.html">
          <div class="card-title">Claude Agent SDK — 멀티 세션 오케스트레이션 가이드</div>
          <div class="card-desc">claude_agent_sdk_guide.html</div>
        </a>
      </li>
      <li>
        <a class="card" href="openclaw_guide.html">
          <div class="card-title">OpenClaw 완전 가이드</div>
          <div class="card-desc">openclaw_guide.html</div>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
